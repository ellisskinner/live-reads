<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f1118">
<title>Live Reads</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700;800&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'JetBrains Mono', monospace;
    background: #0f1118; color: #e2e8f0;
    min-height: 100vh; min-height: 100dvh;
    -webkit-tap-highlight-color: transparent;
    overflow-x: hidden;
    padding-bottom: env(safe-area-inset-bottom, 0);
  }
  input, textarea, button { font-family: inherit; }
  input::placeholder, textarea::placeholder { color: #3a4255; }

  .app { max-width: 480px; margin: 0 auto; }

  /* Header */
  .header { padding: 16px 20px 0; }
  .header h1 {
    font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 900;
    background: linear-gradient(135deg, #22d3ee, #3b82f6);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    letter-spacing: -0.01em;
  }
  .header .sub { margin-top: 4px; font-size: 11px; color: #475569; letter-spacing: 0.08em; text-transform: uppercase; }

  /* Tabs */
  .tabs { display: flex; margin: 16px 20px 0; background: #161a26; border-radius: 12px; padding: 3px; }
  .tab-btn {
    flex: 1; padding: 10px 0; background: transparent; color: #475569;
    border: none; border-radius: 10px; font-size: 13px; font-weight: 700;
    cursor: pointer; letter-spacing: 0.05em; text-transform: uppercase; transition: all 0.15s;
  }
  .tab-btn.active { background: #1e2231; color: #22d3ee; }

  /* Search */
  .search-input {
    width: 100%; padding: 12px 14px; background: #161a26; border: 1px solid #242a3a;
    border-radius: 12px; color: #e2e8f0; font-size: 14px; outline: none;
  }

  /* Tag pills */
  .tag {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 4px 12px; border-radius: 20px; font-size: 13px; font-weight: 600;
    letter-spacing: 0.02em; border-width: 1.5px; border-style: solid;
    cursor: pointer; transition: all 0.15s ease; white-space: nowrap;
    -webkit-user-select: none; user-select: none;
  }
  .tag.sm { padding: 2px 8px; font-size: 11px; }
  .tag .x { cursor: pointer; margin-left: 2px; font-size: 14px; line-height: 1; opacity: 0.7; }

  /* Player card */
  .player-card {
    background: #1a1f2e; border-radius: 14px; padding: 14px 16px;
    cursor: pointer; transition: all 0.15s; border: 1px solid #242a3a;
  }
  .player-card.assign-mode { border: 1.5px solid #22d3ee; }
  .player-card .name { font-size: 16px; font-weight: 700; color: #e2e8f0; font-family: 'Playfair Display', serif; }
  .player-card .notes-preview {
    margin-top: 8px; font-size: 12px; color: #64748b; line-height: 1.4;
    overflow: hidden; text-overflow: ellipsis; display: -webkit-box;
    -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  }

  /* Modal overlay */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 100;
    background: rgba(0,0,0,0.7); backdrop-filter: blur(6px);
    display: flex; align-items: flex-end; justify-content: center;
  }
  .modal-sheet {
    background: #161a26; width: 100%; max-width: 480px;
    border-radius: 20px 20px 0 0; padding: 24px 20px;
    max-height: 90vh; overflow-y: auto;
    box-shadow: 0 -8px 40px rgba(0,0,0,0.5);
    animation: slideUp 0.25s ease;
    padding-bottom: calc(24px + env(safe-area-inset-bottom, 0));
  }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

  .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
  .modal-header h2 { font-size: 20px; font-family: 'Playfair Display', serif; color: #e2e8f0; }
  .modal-close { background: none; border: none; color: #64748b; font-size: 28px; cursor: pointer; line-height: 1; }

  .field-label {
    font-size: 11px; color: #64748b; font-weight: 700;
    letter-spacing: 0.1em; text-transform: uppercase;
  }
  .field-input {
    width: 100%; padding: 12px 14px; margin-top: 6px;
    background: #1e2231; border: 1px solid #2a3040; border-radius: 10px;
    color: #e2e8f0; font-size: 16px; outline: none;
  }
  .field-textarea {
    width: 100%; padding: 12px 14px; margin-top: 6px;
    background: #1e2231; border: 1px solid #2a3040; border-radius: 10px;
    color: #e2e8f0; font-size: 14px; outline: none; resize: vertical; line-height: 1.5;
  }

  .btn-primary {
    width: 100%; padding: 14px; background: #22d3ee; color: #0f1118;
    border: none; border-radius: 12px; font-size: 16px; font-weight: 800;
    cursor: pointer; letter-spacing: 0.03em;
  }
  .btn-delete {
    width: 100%; padding: 12px; margin-top: 10px;
    background: transparent; color: #ef4444; border: 1px solid #ef4444;
    border-radius: 12px; font-size: 14px; font-weight: 700; cursor: pointer;
  }

  /* FAB */
  .fab {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    width: 56px; height: 56px; border-radius: 50%;
    background: linear-gradient(135deg, #22d3ee, #3b82f6); color: #0f1118;
    border: none; font-size: 30px; font-weight: 900; cursor: pointer;
    box-shadow: 0 4px 20px rgba(34,211,238,0.35);
    display: flex; align-items: center; justify-content: center; z-index: 50;
    padding: 0; margin: 0; line-height: 1;
    margin-bottom: env(safe-area-inset-bottom, 0);
  }

  /* Seat row */
  .seat-wrapper {
    position: relative; overflow: hidden; border-radius: 10px;
  }
  .seat-actions {
    position: absolute; top: 0; bottom: 0; display: flex; align-items: stretch;
  }
  .seat-actions.left { left: 0; }
  .seat-actions.right { right: 0; }
  .seat-action-btn {
    display: flex; align-items: center; justify-content: center;
    width: 72px; border: none; cursor: pointer;
    font-size: 11px; font-weight: 800; letter-spacing: 0.05em;
    text-transform: uppercase; font-family: 'JetBrains Mono', monospace;
  }
  .seat-action-btn.edit { background: #3b82f6; color: #fff; }
  .seat-action-btn.remove { background: #ef4444; color: #fff; }
  .seat-slide {
    position: relative; z-index: 1; transition: transform 0.25s ease;
    touch-action: pan-y;
  }
  .seat-row {
    display: flex; align-items: center; border-radius: 10px;
    padding: 10px 12px; min-height: 42px;
    border-left: 3px solid #242a3a;
  }
  .seat-row.filled { background: #161a26; padding: 8px 12px; }
  .seat-row.empty { background: #0f1118; cursor: pointer; }
  .seat-num { font-size: 11px; font-weight: 800; color: #475569; width: 24px; flex-shrink: 0; }
  .seat-empty-label { font-size: 12px; color: #2a3040; }
  .seat-expand { margin-left: 8px; font-size: 10px; color: #64748b; cursor: pointer; padding: 4px 6px; flex-shrink: 0; background: #1e2231; border: 1px solid #2a3040; border-radius: 6px; line-height: 1; }

  .assign-picker {
    margin-top: 12px; background: #161a26; border-radius: 14px;
    border: 1px solid rgba(34,211,238,0.2); padding: 12px;
  }
  .assign-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .assign-label { font-size: 12px; color: #22d3ee; font-weight: 700; }
  .assign-cancel { background: none; border: none; color: #64748b; font-size: 13px; cursor: pointer; }
  .assign-search {
    width: 100%; padding: 8px 12px; margin-bottom: 8px;
    background: #1e2231; border: 1px solid #2a3040; border-radius: 8px;
    color: #e2e8f0; font-size: 13px; outline: none;
  }
  .assign-option {
    padding: 8px 10px; background: #1a1f2e; border-radius: 8px;
    cursor: pointer; display: flex; align-items: center; gap: 8px;
    border: 1px solid #242a3a; margin-bottom: 6px;
  }
  .assign-option .name { font-size: 13px; font-weight: 700; color: #e2e8f0; font-family: 'Playfair Display', serif; }

  /* Export/Import */
  .data-actions { display: flex; gap: 8px; margin-top: 16px; padding: 0 20px 20px; }
  .data-btn {
    flex: 1; padding: 8px; background: #161a26; border: 1px solid #242a3a;
    border-radius: 8px; color: #64748b; font-size: 11px; font-weight: 700;
    cursor: pointer; text-transform: uppercase; letter-spacing: 0.05em;
    text-align: center;
  }

  .hidden { display: none; }
</style>
</head>
<body>
<div class="app" id="app"></div>

<script>
// ─── State ───
const STORAGE_KEY = "poker-tracker-data";
const TAGS_KEY = "poker-tracker-tags";
const TAG_COLORS_KEY = "poker-tracker-tag-colors";
const DEFAULT_TAGS = ["whale","reg","nit","LAG","TAG","maniac","calling station","unknown"];
const DEFAULT_TAG_COLORS = {
  whale:"#22d3ee", reg:"#f59e0b", nit:"#94a3b8", LAG:"#ef4444",
  TAG:"#3b82f6", maniac:"#f43f5e", "calling station":"#a78bfa", unknown:"#6b7280"
};
const COLOR_SWATCHES = [
  "#22d3ee","#3b82f6","#a78bfa","#8b5cf6",
  "#f43f5e","#ef4444","#f59e0b","#eab308",
  "#22c55e","#10b981","#06b6d4","#ec4899",
  "#94a3b8","#6b7280","#f97316","#84cc16"
];

let customTagColors = {};

let state = {
  players: [],
  tags: [...DEFAULT_TAGS],
  view: "database",
  search: "",
  editing: null,
  seats: [null,null,null,null,null,null,null,null,null,null],
  seatCount: 9,
  assignSeat: null,
  filterTag: null,
  expandedSeats: {},
  colorPickerTag: null,
};

function getTagColor(tag) {
  if (customTagColors[tag]) return customTagColors[tag];
  if (DEFAULT_TAG_COLORS[tag]) return DEFAULT_TAG_COLORS[tag];
  let h = 0;
  for (let i = 0; i < tag.length; i++) h = tag.charCodeAt(i) + ((h << 5) - h);
  return `hsl(${Math.abs(h) % 360}, 55%, 55%)`;
}

function load() {
  try { state.players = JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch { state.players = []; }
  try { const t = JSON.parse(localStorage.getItem(TAGS_KEY)); if (t && t.length) state.tags = t; } catch {}
  try { const c = JSON.parse(localStorage.getItem(TAG_COLORS_KEY)); if (c) customTagColors = c; } catch {}
}

function savePlayers() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state.players)); }
function saveTags() { localStorage.setItem(TAGS_KEY, JSON.stringify(state.tags)); }
function saveTagColors() { localStorage.setItem(TAG_COLORS_KEY, JSON.stringify(customTagColors)); }

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

// ─── Render helpers ───
function tagHTML(tag, selected, small, clickAction, showX, longPressable) {
  const c = getTagColor(tag);
  const cls = small ? "tag sm" : "tag";
  const bg = selected ? c : "transparent";
  const fg = selected ? "#0f1118" : c;
  const click = clickAction ? ` onclick="${clickAction}"` : "";
  const lp = longPressable ? ` data-longpress-tag="${esc(tag)}"` : "";
  const xBtn = showX ? `<span class="x" onclick="event.stopPropagation();${showX}">×</span>` : "";
  return `<span class="${cls}" style="background:${bg};color:${fg};border-color:${c}"${click}${lp}>${esc(tag)}${xBtn}</span>`;
}

function alphaSort(a, b) {
  const na = a.name.toLowerCase(), nb = b.name.toLowerCase();
  const aNum = /^\d/.test(na), bNum = /^\d/.test(nb);
  if (aNum && !bNum) return -1;
  if (!aNum && bNum) return 1;
  return na.localeCompare(nb, undefined, { numeric: true });
}

function getFiltered() {
  return state.players.filter(p => {
    const ms = !state.search || p.name.toLowerCase().includes(state.search.toLowerCase()) || (p.notes||"").toLowerCase().includes(state.search.toLowerCase());
    const mt = !state.filterTag || (p.tags||[]).includes(state.filterTag);
    return ms && mt;
  }).sort(alphaSort);
}

// ─── Render ───
function render() {
  const app = document.getElementById("app");
  let html = "";

  // Header
  html += `<div class="header">
    <h1>Live Reads</h1>
    <p class="sub">${state.players.length} player${state.players.length!==1?"s":""} tracked</p>
  </div>`;

  // Tabs
  html += `<div class="tabs">
    <button class="tab-btn ${state.view==="database"?"active":""}" onclick="switchView('database')">Database</button>
    <button class="tab-btn ${state.view==="table"?"active":""}" onclick="switchView('table')">Table</button>
  </div>`;

  if (state.view === "database") {
    html += renderDatabase();
  } else {
    html += renderTable();
  }

  // Data actions
  html += `<div class="data-actions">
    <button class="data-btn" onclick="exportData()">Export Profiles</button>
    <button class="data-btn" onclick="document.getElementById('import-file').click()">Import Profiles</button>
    <input type="file" id="import-file" accept=".json" class="hidden" onchange="importData(event)">
  </div>`;

  // Modal
  if (state.editing !== null) {
    html += renderEditor();
  }

  app.innerHTML = html;
  setupSwipe();
  setupLongPress();
}

function setupSwipe() {
  const THRESHOLD = 72;
  document.querySelectorAll('.seat-slide').forEach(el => {
    let startX = 0, startY = 0, currentX = 0, swiping = false, locked = false;
    
    el.addEventListener('touchstart', e => {
      startX = e.touches[0].clientX;
      startY = e.touches[0].clientY;
      currentX = 0; swiping = false; locked = false;
      el.style.transition = 'none';
    }, { passive: true });

    el.addEventListener('touchmove', e => {
      const dx = e.touches[0].clientX - startX;
      const dy = e.touches[0].clientY - startY;
      
      // Decide direction lock on first significant move
      if (!locked) {
        if (Math.abs(dx) > 8 || Math.abs(dy) > 8) {
          locked = true;
          swiping = Math.abs(dx) > Math.abs(dy);
        }
        if (!locked) return;
      }
      if (!swiping) return;
      
      e.preventDefault();
      // Clamp between -THRESHOLD and +THRESHOLD
      currentX = Math.max(-THRESHOLD, Math.min(THRESHOLD, dx));
      el.style.transform = `translateX(${currentX}px)`;
    }, { passive: false });

    el.addEventListener('touchend', () => {
      el.style.transition = 'transform 0.25s ease';
      const seat = parseInt(el.dataset.seat);
      
      if (currentX < -THRESHOLD * 0.5) {
        // Swiped left far enough — snap open to reveal Remove
        el.style.transform = `translateX(-${THRESHOLD}px)`;
        // Auto-close after 3s
        setTimeout(() => {
          if (el.parentNode) { el.style.transform = 'translateX(0)'; }
        }, 3000);
      } else if (currentX > THRESHOLD * 0.5) {
        // Swiped right far enough — snap open to reveal Edit
        el.style.transform = `translateX(${THRESHOLD}px)`;
        setTimeout(() => {
          if (el.parentNode) { el.style.transform = 'translateX(0)'; }
        }, 3000);
      } else {
        // Snap back
        el.style.transform = 'translateX(0)';
      }
      swiping = false;
    }, { passive: true });
  });
}

function setupLongPress() {
  let timer = null;
  let fired = false;
  document.querySelectorAll('[data-longpress-tag]').forEach(el => {
    const tag = el.dataset.longpressTag;
    
    el.addEventListener('touchstart', e => {
      fired = false;
      timer = setTimeout(() => {
        fired = true;
        _longPressJustFired = true;
        state.colorPickerTag = tag;
        render();
      }, 500);
    }, { passive: true });

    el.addEventListener('touchend', e => {
      clearTimeout(timer);
      if (fired) { e.preventDefault(); e.stopPropagation(); }
    });

    el.addEventListener('touchmove', () => {
      clearTimeout(timer);
    }, { passive: true });
  });
}

function setTagColor(tag, color) {
  customTagColors[tag] = color;
  saveTagColors();
  state.colorPickerTag = null;
  render();
}

function renderDatabase() {
  const filtered = getFiltered();
  let h = `<div style="padding:16px 20px">`;

  // Search
  h += `<input class="search-input" value="${esc(state.search)}" oninput="state.search=this.value;render()" placeholder="Search players...">`;

  // Player list
  h += `<div style="display:flex;flex-direction:column;gap:10px;margin-top:16px">`;
  if (filtered.length === 0) {
    h += `<p style="text-align:center;color:#475569;font-size:13px;padding:20px">${state.players.length===0?"No players yet. Add your first read.":"No matches."}</p>`;
  }
  for (const p of filtered) {
    h += `<div class="player-card" onclick="editPlayer('${p.id}')">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <span class="name">${esc(p.name)}</span>
      </div>`;
    if (p.tags && p.tags.length) {
      h += `<div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:8px">`;
      for (const t of p.tags) h += tagHTML(t, true, true);
      h += `</div>`;
    }
    if (p.notes) {
      h += `<p class="notes-preview">${esc(p.notes)}</p>`;
    }
    h += `</div>`;
  }
  h += `</div>`;

  // FAB
  h += `<button class="fab" onclick="newPlayer()">+</button>`;
  h += `</div>`;
  return h;
}

function renderTable() {
  let h = `<div style="padding:12px 20px">`;

  // Header
  h += `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
    <div style="display:flex;align-items:center;gap:8px">
      <span class="field-label" style="white-space:nowrap">Seats</span>
      <select onchange="setSeatCount(parseInt(this.value))" style="
        background:#1e2231;color:#22d3ee;border:1px solid #2a3040;border-radius:8px;
        padding:4px 8px;font-size:13px;font-weight:700;font-family:'JetBrains Mono',monospace;
        outline:none;cursor:pointer;-webkit-appearance:none;appearance:none;
        text-align:center;min-width:44px;
      ">`;
  for (let n = 2; n <= 10; n++) {
    h += `<option value="${n}" ${state.seatCount===n?'selected':''}>${n}</option>`;
  }
  h += `</select>
    </div>
    <div style="display:flex;gap:6px">
      <button class="data-btn" style="flex:none;margin:0;border-color:#3b82f6;color:#3b82f6" onclick="collapseAll()">Collapse All</button>
      <button class="data-btn" style="flex:none;margin:0" onclick="clearTable()">Clear All</button>
    </div>
  </div>`;

  // Seat rows
  h += `<div style="display:flex;flex-direction:column;gap:4px">`;
  for (let i = 0; i < state.seatCount; i++) {
    const id = state.seats[i];
    const p = id ? state.players.find(pl => pl.id === id) : null;
    const bc = p ? getTagColor((p.tags||[])[0] || "unknown") : "#242a3a";

    if (p) {
      const expanded = !!state.expandedSeats[i];
      h += `<div class="seat-wrapper" id="seat-wrap-${i}">
        <div class="seat-actions left"><button class="seat-action-btn edit" onclick="editPlayer('${p.id}')">Edit</button></div>
        <div class="seat-actions right"><button class="seat-action-btn remove" onclick="removeSeat(${i})">Remove</button></div>
        <div class="seat-slide" id="seat-slide-${i}" data-seat="${i}">
          <div class="seat-row filled" style="border-left-color:${bc};flex-direction:column;align-items:stretch">
            <div style="display:flex;align-items:center">
              <span class="seat-num">${i+1}</span>
              <div style="flex:1;min-width:0">
                <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
                  <span style="font-size:14px;font-weight:700;color:#e2e8f0;font-family:'Playfair Display',serif;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(p.name)}</span>`;
      for (const t of (p.tags||[])) h += tagHTML(t, true, true);
      h += `</div>`;
      if (p.notes && !expanded) {
        h += `<p style="margin:3px 0 0;font-size:11px;color:#64748b;line-height:1.3;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical">${esc(p.notes)}</p>`;
      }
      h += `</div>
              <button class="seat-expand" onclick="toggleSeatExpand(${i})" title="${expanded?'Collapse':'Expand'}">${expanded?'▲':'▼'}</button>
            </div>`;
      if (expanded && p.notes) {
        h += `<div style="margin:6px 0 2px 24px;padding:8px 10px;background:#1e2231;border-radius:8px;font-size:12px;color:#94a3b8;line-height:1.5;white-space:pre-wrap">${esc(p.notes)}</div>`;
      }
      h += `</div>
        </div>
      </div>`;
    } else {
      h += `<div class="seat-row empty" onclick="startAssign(${i})">
        <span class="seat-num">${i+1}</span>
        <span class="seat-empty-label">tap to assign</span>
      </div>`;
    }
  }
  h += `</div>`;

  // Assignment picker
  if (state.assignSeat !== null) {
    const filtered = getFiltered();
    h += `<div class="assign-picker">
      <div class="assign-header">
        <span class="assign-label">Seat ${state.assignSeat+1} ← pick player</span>
        <button class="assign-cancel" onclick="cancelAssign()">Cancel</button>
      </div>
      <input class="assign-search" value="${esc(state.search)}" oninput="state.search=this.value;render()" placeholder="Search...">
      <div style="max-height:200px;overflow-y:auto">`;
    for (const p of filtered) {
      h += `<div class="assign-option" onclick="assignPlayer('${p.id}')">
        <span class="name">${esc(p.name)}</span>`;
      for (const t of (p.tags||[]).slice(0,2)) h += tagHTML(t, true, true);
      h += `</div>`;
    }
    if (filtered.length === 0) {
      h += `<p style="font-size:12px;color:#475569;text-align:center;padding:8px">No players found</p>`;
    }
    h += `</div></div>`;
  }

  h += `</div>`;
  return h;
}

function renderEditor() {
  const isNew = state.editing === "new";
  const p = isNew ? { name:"", notes:"", tags:[] } : state.players.find(pl => pl.id === state.editing);
  if (!p) return "";

  // We use a temp store for editor state
  if (!window._edit) window._edit = { name: p.name, notes: p.notes||"", tags: [...(p.tags||[])] };

  let h = `<div class="modal-overlay" onclick="if(event.target===this)closeEditor()">
    <div class="modal-sheet">
      <div class="modal-header">
        <h2>${isNew ? "New Player" : "Edit Player"}</h2>
        <button class="modal-close" onclick="closeEditor()">×</button>
      </div>`;

  // Name
  h += `<label class="field-label">Name / Nickname</label>
    <input class="field-input" value="${esc(window._edit.name)}" oninput="window._edit.name=this.value" placeholder="e.g. Red Hat Mike" style="margin-bottom:16px">`;

  // Tags
  h += `<label class="field-label">Tags <span style="font-weight:400;color:#3a4255;text-transform:none;letter-spacing:0">(long-press to change color)</span></label>
    <div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:8px;margin-bottom:8px">`;
  for (const t of state.tags) {
    const sel = window._edit.tags.includes(t);
    h += tagHTML(t, sel, false, `toggleEditTag('${esc(t)}')`, false, true);
  }
  // Show any custom tags on the player not in master list
  for (const t of window._edit.tags) {
    if (!state.tags.includes(t)) {
      h += tagHTML(t, true, false, `toggleEditTag('${esc(t)}')`, false, true);
    }
  }
  h += `</div>`;

  // Color picker (shown when a tag is long-pressed)
  if (state.colorPickerTag) {
    const currentColor = getTagColor(state.colorPickerTag);
    h += `<div style="background:#1e2231;border:1px solid #2a3040;border-radius:12px;padding:12px;margin-bottom:12px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <span style="font-size:12px;color:#e2e8f0;font-weight:700">Color for <span style="color:${currentColor}">${esc(state.colorPickerTag)}</span></span>
        <button onclick="state.colorPickerTag=null;render()" style="background:none;border:none;color:#64748b;font-size:16px;cursor:pointer">×</button>
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:8px">`;
    for (const c of COLOR_SWATCHES) {
      const isCurrent = currentColor === c;
      h += `<div onclick="setTagColor('${esc(state.colorPickerTag)}','${c}')" style="
        width:32px;height:32px;border-radius:50%;background:${c};cursor:pointer;
        border:${isCurrent ? '3px solid #fff' : '2px solid transparent'};
        box-shadow:${isCurrent ? '0 0 8px '+c : 'none'};
      "></div>`;
    }
    h += `</div></div>`;
  }

  h += `<div style="display:flex;gap:8px;margin-bottom:16px">
    <input class="field-input" id="new-tag-input" placeholder="+ custom tag" style="flex:1;margin-top:0;font-size:14px;padding:8px 12px" onkeydown="if(event.key==='Enter')addEditTag()">
    <button style="padding:8px 16px;background:#22d3ee;color:#0f1118;border:none;border-radius:8px;font-weight:700;cursor:pointer;font-family:'JetBrains Mono',monospace" onclick="addEditTag()">Add</button>
  </div>`;

  // Notes
  h += `<label class="field-label">Observations</label>
    <textarea class="field-textarea" rows="4" oninput="window._edit.notes=this.value" placeholder="Tendencies, tells, sizing patterns..." style="margin-bottom:20px">${esc(window._edit.notes)}</textarea>`;

  // Save
  h += `<button class="btn-primary" onclick="savePlayer(${isNew?"null":`'${p.id}'`})">${isNew?"Add Player":"Save Changes"}</button>`;

  // Delete
  if (!isNew) {
    h += `<button class="btn-delete" onclick="deletePlayer('${p.id}')">Delete Player</button>`;
  }

  h += `</div></div>`;
  return h;
}

// ─── Actions ───
function switchView(v) { state.view = v; state.assignSeat = null; state.search = ""; render(); }
function toggleFilter(tag) { state.filterTag = state.filterTag === tag ? null : tag; render(); }
function newPlayer() { state.editing = "new"; window._edit = { name:"", notes:"", tags:[] }; render(); }
function editPlayer(id) { state.editing = id; const p = state.players.find(x=>x.id===id); window._edit = { name:p.name, notes:p.notes||"", tags:[...(p.tags||[])] }; render(); }
function closeEditor() { state.editing = null; window._edit = null; state.colorPickerTag = null; render(); }

let _longPressJustFired = false;
function toggleEditTag(tag) {
  if (_longPressJustFired) { _longPressJustFired = false; return; }
  if (!window._edit) return;
  const i = window._edit.tags.indexOf(tag);
  if (i > -1) window._edit.tags.splice(i,1); else window._edit.tags.push(tag);
  render();
}

function addEditTag() {
  const inp = document.getElementById("new-tag-input");
  if (!inp) return;
  const t = inp.value.trim().toLowerCase();
  if (t && !window._edit.tags.includes(t)) window._edit.tags.push(t);
  inp.value = "";
  render();
}

function savePlayer(existingId) {
  if (!window._edit || !window._edit.name.trim()) return;
  const now = new Date().toISOString();
  // Ensure any new tags get added to master list
  for (const t of window._edit.tags) {
    if (!state.tags.includes(t)) state.tags.push(t);
  }
  saveTags();

  if (existingId) {
    const idx = state.players.findIndex(p => p.id === existingId);
    if (idx > -1) {
      state.players[idx] = { ...state.players[idx], name: window._edit.name.trim(), notes: window._edit.notes, tags: window._edit.tags, updatedAt: now };
    }
  } else {
    state.players.push({ id: Date.now().toString(), name: window._edit.name.trim(), notes: window._edit.notes, tags: window._edit.tags, updatedAt: now });
  }
  savePlayers();
  closeEditor();
}

function deletePlayer(id) {
  state.players = state.players.filter(p => p.id !== id);
  state.seats = state.seats.map(s => s === id ? null : s);
  savePlayers();
  closeEditor();
}

// Table actions
function startAssign(i) { state.assignSeat = i; state.search = ""; render(); }
function cancelAssign() { state.assignSeat = null; state.search = ""; render(); }
function removeSeat(i) { state.seats[i] = null; delete state.expandedSeats[i]; render(); }
function clearTable() { state.seats = [null,null,null,null,null,null,null,null,null,null]; state.expandedSeats = {}; render(); }
function setSeatCount(n) { state.seatCount = n; state.assignSeat = null; render(); }
function toggleSeatExpand(i) { if (state.expandedSeats[i]) delete state.expandedSeats[i]; else state.expandedSeats[i] = true; render(); }
function collapseAll() { state.expandedSeats = {}; render(); }

function assignPlayer(id) {
  // Remove from any existing seat
  state.seats = state.seats.map(s => s === id ? null : s);
  state.seats[state.assignSeat] = id;
  state.assignSeat = null;
  state.search = "";
  render();
}

// Export / Import
function exportData() {
  const data = { players: state.players, tags: state.tags, tagColors: customTagColors };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
  const file = new File([blob], "live-reads-backup.json", { type: "application/json" });

  // Use share sheet on mobile (gives Save to Files option on iOS)
  if (navigator.canShare && navigator.canShare({ files: [file] })) {
    navigator.share({ files: [file], title: "Live Reads Backup" }).catch(() => {});
  } else {
    // Fallback for desktop
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = "live-reads-backup.json"; a.click();
    URL.revokeObjectURL(url);
  }
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      if (data.players && Array.isArray(data.players)) {
        for (const p of data.players) {
          const idx = state.players.findIndex(x => x.id === p.id);
          if (idx > -1) state.players[idx] = p; else state.players.push(p);
        }
        savePlayers();
      }
      if (data.tags && Array.isArray(data.tags)) {
        for (const t of data.tags) { if (!state.tags.includes(t)) state.tags.push(t); }
        saveTags();
      }
      if (data.tagColors && typeof data.tagColors === 'object') {
        Object.assign(customTagColors, data.tagColors);
        saveTagColors();
      }
      render();
      alert("Import successful! " + (data.players||[]).length + " players loaded.");
    } catch (err) {
      alert("Invalid file format.");
    }
  };
  reader.readAsText(file);
  event.target.value = "";
}

// ─── Init ───
load();
render();
</script>
</body>
</html>
